# Configuration Notes / Примечания к конфигурации:
#
# 1. Chain IDs must match the actual chain IDs
#    ID сетей должны соответствовать реальным ID сетей
#
# 2. RPC and gRPC addresses must be accessible
#    RPC и gRPC адреса должны быть доступны
#
# 3. Key names must match the keys added to Hermes
#    Имена ключей должны соответствовать ключам, добавленным в Hermes
#
# 4. Gas prices should be appropriate for each network
#    Цены на газ должны быть подходящими для каждой сети
#
# 5. Trusting period should be less than unbonding period
#    Период доверия должен быть меньше периода разблокировки
#
# 6. For production, use secure RPC endpoints with authentication
#    Для продакшена используйте безопасные RPC эндпоинты с аутентификацией
