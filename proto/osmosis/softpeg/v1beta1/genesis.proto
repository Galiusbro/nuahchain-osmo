syntax = "proto3";
package osmosis.softpeg.v1beta1;

import "gogoproto/gogo.proto";
import "osmosis/softpeg/v1beta1/params.proto";
import "osmosis/softpeg/v1beta1/softpeg.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/softpeg/types";

// GenesisState defines the softpeg module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [(gogoproto.nullable) = false];

  // price_data_list defines all the price data entries.
  repeated PriceData price_data_list = 2 [(gogoproto.nullable) = false];

  // community_metrics_list defines all the community metrics entries.
  repeated CommunityMetrics community_metrics_list = 3 [(gogoproto.nullable) = false];

  // peg_config defines the peg configuration.
  PegConfig peg_config = 4;
}
