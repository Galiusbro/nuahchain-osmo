syntax = "proto3";
package osmosis.softpeg.v1beta1;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "osmosis/softpeg/v1beta1/params.proto";
import "osmosis/softpeg/v1beta1/softpeg.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/softpeg/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a governance operation for updating the x/softpeg module
  // parameters. The authority is hard-coded to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // UpdatePegConfig updates the peg configuration.
  rpc UpdatePegConfig(MsgUpdatePegConfig) returns (MsgUpdatePegConfigResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1;

  // params defines the x/softpeg parameters to update.
  //
  // NOTE: All parameters must be supplied.
  Params params = 2 [(gogoproto.nullable) = false];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgUpdatePegConfig is the Msg/UpdatePegConfig request type.
message MsgUpdatePegConfig {
  option (cosmos.msg.v1.signer) = "authority";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1;

  // peg_config defines the peg configuration to update.
  PegConfig peg_config = 2;
}

// MsgUpdatePegConfigResponse defines the response structure for executing a
// MsgUpdatePegConfig message.
message MsgUpdatePegConfigResponse {}
