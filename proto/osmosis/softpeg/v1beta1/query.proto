syntax = "proto3";
package osmosis.softpeg.v1beta1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "osmosis/softpeg/v1beta1/params.proto";
import "osmosis/softpeg/v1beta1/softpeg.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/softpeg/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/osmosis/softpeg/v1beta1/params";
  }

  // PriceData queries price data by timestamp.
  rpc PriceData(QueryPriceDataRequest) returns (QueryPriceDataResponse) {
    option (google.api.http).get = "/osmosis/softpeg/v1beta1/price_data/{timestamp}";
  }

  // AllPriceData queries all price data with pagination.
  rpc AllPriceData(QueryAllPriceDataRequest) returns (QueryAllPriceDataResponse) {
    option (google.api.http).get = "/osmosis/softpeg/v1beta1/price_data";
  }

  // CommunityMetrics queries community metrics by timestamp.
  rpc CommunityMetrics(QueryCommunityMetricsRequest) returns (QueryCommunityMetricsResponse) {
    option (google.api.http).get = "/osmosis/softpeg/v1beta1/community_metrics/{timestamp}";
  }

  // AllCommunityMetrics queries all community metrics with pagination.
  rpc AllCommunityMetrics(QueryAllCommunityMetricsRequest) returns (QueryAllCommunityMetricsResponse) {
    option (google.api.http).get = "/osmosis/softpeg/v1beta1/community_metrics";
  }

  // PegConfig queries the current peg configuration.
  rpc PegConfig(QueryPegConfigRequest) returns (QueryPegConfigResponse) {
    option (google.api.http).get = "/osmosis/softpeg/v1beta1/peg_config";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [(gogoproto.nullable) = false];
}

// QueryPriceDataRequest is request type for the Query/PriceData RPC method.
message QueryPriceDataRequest {
  int64 timestamp = 1;
}

// QueryPriceDataResponse is response type for the Query/PriceData RPC method.
message QueryPriceDataResponse {
  PriceData price_data = 1;
}

// QueryAllPriceDataRequest is request type for the Query/AllPriceData RPC method.
message QueryAllPriceDataRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryAllPriceDataResponse is response type for the Query/AllPriceData RPC method.
message QueryAllPriceDataResponse {
  repeated PriceData price_data = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryCommunityMetricsRequest is request type for the Query/CommunityMetrics RPC method.
message QueryCommunityMetricsRequest {
  int64 timestamp = 1;
}

// QueryCommunityMetricsResponse is response type for the Query/CommunityMetrics RPC method.
message QueryCommunityMetricsResponse {
  CommunityMetrics community_metrics = 1;
}

// QueryAllCommunityMetricsRequest is request type for the Query/AllCommunityMetrics RPC method.
message QueryAllCommunityMetricsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryAllCommunityMetricsResponse is response type for the Query/AllCommunityMetrics RPC method.
message QueryAllCommunityMetricsResponse {
  repeated CommunityMetrics community_metrics = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryPegConfigRequest is request type for the Query/PegConfig RPC method.
message QueryPegConfigRequest {}

// QueryPegConfigResponse is response type for the Query/PegConfig RPC method.
message QueryPegConfigResponse {
  PegConfig peg_config = 1;
}
