syntax = "proto3";
package osmosis.bondingcurve.v1beta1;

import "gogoproto/gogo.proto";
import "osmosis/bondingcurve/v1beta1/params.proto";
import "osmosis/bondingcurve/v1beta1/pool.proto";
import "osmosis/bondingcurve/v1beta1/margin.proto";
import "osmosis/bondingcurve/v1beta1/admin.proto";
import "osmosis/bondingcurve/v1beta1/tx.proto";
import "osmosis/bondingcurve/v1beta1/metrics.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/bondingcurve/types";

message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false];
  repeated BondingCurvePool pools = 2 [(gogoproto.nullable) = false];
  repeated MarginPool margin_pools = 3 [(gogoproto.nullable) = false];
  repeated MarginPosition margin_positions = 4 [(gogoproto.nullable) = false];
  PauseInfo global_pause = 5;
  repeated TokenPauseEntry token_pauses = 6 [(gogoproto.nullable) = false];
  repeated FreezeEntry freeze_entries = 7 [(gogoproto.nullable) = false];
  PendingParams pending_params = 8;
  repeated EmergencyAction emergency_actions = 9 [(gogoproto.nullable) = false];
  EmergencyConfig emergency_config = 10;
  uint64 emergency_action_seq = 11;
  ModuleStats module_stats = 12;
  repeated TokenStats token_stats = 13 [(gogoproto.nullable) = false];
  repeated LiquidationRecord liquidation_records = 14 [(gogoproto.nullable) = false];
  uint64 liquidation_seq = 15;
}

message TokenPauseEntry {
  string denom = 1;
  PauseInfo info = 2 [(gogoproto.nullable) = false];
}

message FreezeEntry {
  FreezeTargetType target_type = 1;
  string target = 2;
  FreezeInfo info = 3 [(gogoproto.nullable) = false];
}
