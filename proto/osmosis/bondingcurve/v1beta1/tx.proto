syntax = "proto3";
package osmosis.bondingcurve.v1beta1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "google/protobuf/duration.proto";
import "gogoproto/gogo.proto";
import "osmosis/bondingcurve/v1beta1/admin.proto";
import "osmosis/bondingcurve/v1beta1/margin.proto";
import "osmosis/bondingcurve/v1beta1/params.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/bondingcurve/types";

service Msg {
  rpc BuyFromCurve(MsgBuyFromCurve) returns (MsgBuyFromCurveResponse);
  rpc SellToCurve(MsgSellToCurve) returns (MsgSellToCurveResponse);
  rpc OpenMarginPosition(MsgOpenMarginPosition) returns (MsgOpenMarginPositionResponse);
  rpc CloseMarginPosition(MsgCloseMarginPosition) returns (MsgCloseMarginPositionResponse);
  rpc LiquidateMarginPosition(MsgLiquidateMarginPosition) returns (MsgLiquidateMarginPositionResponse);
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc SetEmergencyPause(MsgSetEmergencyPause) returns (MsgSetEmergencyPauseResponse);
  rpc SetTokenPause(MsgSetTokenPause) returns (MsgSetTokenPauseResponse);
  rpc ForceLiquidation(MsgForceLiquidation) returns (MsgForceLiquidationResponse);
  rpc SetFreeze(MsgSetFreeze) returns (MsgSetFreezeResponse);
}

message MsgBuyFromCurve {
  option (amino.name) = "osmosis/bondingcurve/buy";
  option (cosmos.msg.v1.signer) = "trader";

  string trader = 1;
  string denom = 2;
  string payment_denom = 3;
  string payment_amount = 4;
  string min_tokens_out = 5;
}

message MsgBuyFromCurveResponse {
  string tokens_out = 1;
  string price_paid = 2;
}

message MsgSellToCurve {
  option (amino.name) = "osmosis/bondingcurve/sell";
  option (cosmos.msg.v1.signer) = "trader";

  string trader = 1;
  string denom = 2;
  string token_amount = 3;
  string payment_denom = 4;
  string min_payment_out = 5;
}

message MsgSellToCurveResponse {
  string payment_out = 1;
  string price_received = 2;
}

message MsgOpenMarginPosition {
  option (amino.name) = "osmosis/bondingcurve/open-margin";
  option (cosmos.msg.v1.signer) = "trader";

  string trader = 1;
  string denom = 2;
  string collateral_denom = 3;
  string collateral_amount = 4;
  uint32 leverage = 5;
  PositionType position_type = 6;
  string min_position_size = 7;
  PriceSource price_source = 8;
}

message MsgOpenMarginPositionResponse {
  uint64 position_id = 1;
  string position_size = 2;
  string entry_price = 3;
  string liquidation_price = 4;
}

message MsgCloseMarginPosition {
  option (amino.name) = "osmosis/bondingcurve/close-margin";
  option (cosmos.msg.v1.signer) = "trader";

  string trader = 1;
  uint64 position_id = 2;
  string min_payout = 3;
}

message MsgCloseMarginPositionResponse {
  string payout_amount = 1;
  string realized_pnl = 2;
  string fees_paid = 3;
}

message MsgLiquidateMarginPosition {
  option (amino.name) = "osmosis/bondingcurve/liquidate-margin";
  option (cosmos.msg.v1.signer) = "liquidator";

  string liquidator = 1;
  uint64 position_id = 2;
}

message MsgLiquidateMarginPositionResponse {
  string liquidation_type = 1;
  string payout_amount = 2;
  string liquidator_reward = 3;
  string bad_debt = 4;
}

message MsgUpdateParams {
  option (amino.name) = "osmosis/bondingcurve/update-params";
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  Params params = 2 [(gogoproto.nullable) = false];
}

message MsgUpdateParamsResponse {
  PendingParams pending_params = 1;
}

message MsgSetEmergencyPause {
  option (amino.name) = "osmosis/bondingcurve/set-emergency-pause";
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  bool paused = 2;
  string reason = 3;
  google.protobuf.Duration resume_in = 4 [(gogoproto.nullable) = false, (gogoproto.stdduration) = true];
  repeated string signers = 5;
}

message MsgSetEmergencyPauseResponse {
  PauseInfo status = 1;
}

message MsgSetTokenPause {
  option (amino.name) = "osmosis/bondingcurve/set-token-pause";
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string denom = 2;
  bool paused = 3;
  string reason = 4;
  google.protobuf.Duration resume_in = 5 [(gogoproto.nullable) = false, (gogoproto.stdduration) = true];
  repeated string signers = 6;
}

message MsgSetTokenPauseResponse {
  PauseInfo status = 1;
}

message MsgForceLiquidation {
  option (amino.name) = "osmosis/bondingcurve/force-liquidation";
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  repeated uint64 position_ids = 2;
  string reason = 3;
  repeated string signers = 4;
}

message MsgForceLiquidationResponse {
  uint64 positions_processed = 1;
}

enum FreezeTargetType {
  FREEZE_TARGET_TYPE_UNSPECIFIED = 0;
  FREEZE_TARGET_TYPE_ADDRESS = 1;
  FREEZE_TARGET_TYPE_TOKEN = 2;
}

message MsgSetFreeze {
  option (amino.name) = "osmosis/bondingcurve/set-freeze";
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  FreezeTargetType target_type = 2;
  string target = 3;
  bool frozen = 4;
  string reason = 5;
  google.protobuf.Duration duration = 6 [(gogoproto.nullable) = false, (gogoproto.stdduration) = true];
  repeated string signers = 7;
}

message MsgSetFreezeResponse {
  FreezeInfo status = 1;
}
