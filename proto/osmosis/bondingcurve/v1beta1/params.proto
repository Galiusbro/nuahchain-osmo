syntax = "proto3";
package osmosis.bondingcurve.v1beta1;

import "gogoproto/gogo.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/bondingcurve/types";

message Params {
  string bonding_curve_wallet = 1;
  string quote_denom = 2;
  string max_supply = 3;
  string start_price = 4;
  string end_price = 5;
}
