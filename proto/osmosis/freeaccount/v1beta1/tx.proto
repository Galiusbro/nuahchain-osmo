syntax = "proto3";
package osmosis.freeaccount.v1beta1;

import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto";
import "cosmos/msg/v1/msg.proto";
import "amino/amino.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/freeaccount/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // CreateFreeAccount creates a new free account
  rpc CreateFreeAccount(MsgCreateFreeAccount)
      returns (MsgCreateFreeAccountResponse);
}

// MsgCreateFreeAccount defines a message to create a free account
message MsgCreateFreeAccount {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "osmosis/MsgCreateFreeAccount";

  // Authority is the address that controls the module (governance, module
  // admin, etc).
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // Address is the address to create as a free account
  string address = 2 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
}

// MsgCreateFreeAccountResponse defines the Msg/CreateFreeAccount response type.
message MsgCreateFreeAccountResponse {}
