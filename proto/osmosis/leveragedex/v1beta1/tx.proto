syntax = "proto3";
package osmosis.leveragedex.v1beta1;

import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "osmosis/bondingcurve/v1beta1/margin.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/leveragedex/types";

service Msg {
  rpc OpenMarginPosition(MsgOpenMarginPosition) returns (MsgOpenMarginPositionResponse);
  rpc CloseMarginPosition(MsgCloseMarginPosition) returns (MsgCloseMarginPositionResponse);
}

message MsgOpenMarginPosition {
  option (cosmos.msg.v1.signer) = "trader";
  option (amino.name) = "osmosis/leveragedex/open-margin-position";

  string trader = 1;
  string denom = 2;
  string collateral_denom = 3;
  string collateral_amount = 4;
  uint32 leverage = 5;
  osmosis.bondingcurve.v1beta1.PositionType position_type = 6;
}

message MsgOpenMarginPositionResponse {
  uint64 position_id = 1;
  string entry_price = 2;
  string position_size = 3;
  string liquidation_price = 4;
}

message MsgCloseMarginPosition {
  option (cosmos.msg.v1.signer) = "trader";
  option (amino.name) = "osmosis/leveragedex/close-margin-position";

  string trader = 1;
  uint64 position_id = 2;
}

message MsgCloseMarginPositionResponse {
  string returned_amount = 1;
}
