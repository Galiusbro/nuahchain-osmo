syntax = "proto3";
package osmosis.treasury.v1beta1;

import "cosmos/base/query/v1beta1/pagination.proto";
import "google/api/annotations.proto";
import "gogoproto/gogo.proto";
import "osmosis/treasury/v1beta1/treasury.proto";
import "osmosis/treasury/v1beta1/params.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/treasury/types";

service Query {
  rpc TreasuryPool(QueryTreasuryPoolRequest) returns (QueryTreasuryPoolResponse) {
    option (google.api.http).get = "/osmosis/treasury/v1beta1/pools/{pool_id}";
  };

  rpc TreasuryPools(QueryTreasuryPoolsRequest) returns (QueryTreasuryPoolsResponse) {
    option (google.api.http).get = "/osmosis/treasury/v1beta1/pools";
  };

  rpc PoolBalances(QueryPoolBalancesRequest) returns (QueryPoolBalancesResponse) {
    option (google.api.http).get = "/osmosis/treasury/v1beta1/pools/{pool_id}/balances";
  };

  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/osmosis/treasury/v1beta1/params";
  };
}

message QueryTreasuryPoolRequest {
  string pool_id = 1;
}

message QueryTreasuryPoolResponse {
  TreasuryPool pool = 1;
}

message QueryTreasuryPoolsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryTreasuryPoolsResponse {
  repeated TreasuryPool pools = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryPoolBalancesRequest {
  string pool_id = 1;
}

message QueryPoolBalancesResponse {
  repeated PoolBalance balances = 1;
  repeated PoolReserves reserves = 2;
}

message QueryParamsRequest {}

message QueryParamsResponse {
  Params params = 1;
}
