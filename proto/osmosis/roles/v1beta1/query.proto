syntax = "proto3";
package osmosis.roles.v1beta1;

import "cosmos/base/query/v1beta1/pagination.proto";
import "google/api/annotations.proto";
import "gogoproto/gogo.proto";
import "osmosis/roles/v1beta1/roles.proto";
import "osmosis/roles/v1beta1/params.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/roles/types";

service Query {
  rpc RolesByAddress(QueryRolesByAddressRequest) returns (QueryRolesByAddressResponse) {
    option (google.api.http).get = "/osmosis/roles/v1beta1/roles/{address}";
  };

  rpc AllRoleBindings(QueryAllRoleBindingsRequest) returns (QueryAllRoleBindingsResponse) {
    option (google.api.http).get = "/osmosis/roles/v1beta1/roles";
  };

  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/osmosis/roles/v1beta1/params";
  };
}

message QueryRolesByAddressRequest {
  string address = 1;
}

message QueryRolesByAddressResponse {
  RoleBinding binding = 1;
}

message QueryAllRoleBindingsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllRoleBindingsResponse {
  repeated RoleBinding bindings = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryParamsRequest {}

message QueryParamsResponse {
  Params params = 1;
}
