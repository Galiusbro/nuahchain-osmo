syntax = "proto3";
package osmosis.roles.v1beta1;

import "gogoproto/gogo.proto";
import "osmosis/roles/v1beta1/params.proto";
import "osmosis/roles/v1beta1/roles.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/roles/types";

// GenesisState defines the roles module's genesis state.
message GenesisState {
  Params params = 1 [ (gogoproto.nullable) = false ];
  repeated RoleBinding bindings = 2 [ (gogoproto.nullable) = false ];
}
