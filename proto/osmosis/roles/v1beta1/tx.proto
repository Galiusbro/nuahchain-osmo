syntax = "proto3";
package osmosis.roles.v1beta1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "google/api/annotations.proto";
import "gogoproto/gogo.proto";
import "osmosis/roles/v1beta1/roles.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/roles/types";

service Msg {
  rpc AssignRoles(MsgAssignRoles) returns (MsgAssignRolesResponse) {
    option (google.api.http).post = "/osmosis/roles/v1beta1/assign";
  };
  rpc RevokeRoles(MsgRevokeRoles) returns (MsgRevokeRolesResponse) {
    option (google.api.http).post = "/osmosis/roles/v1beta1/revoke";
  };
  rpc UpdateAuthority(MsgUpdateAuthority) returns (MsgUpdateAuthorityResponse) {
    option (google.api.http).post = "/osmosis/roles/v1beta1/authority";
  };
}

message MsgAssignRoles {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "osmosis/roles/assign";

  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string address = 2 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  repeated Role roles = 3;
}

message MsgAssignRolesResponse {}

message MsgRevokeRoles {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "osmosis/roles/revoke";

  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string address = 2 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  repeated Role roles = 3;
}

message MsgRevokeRolesResponse {}

message MsgUpdateAuthority {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "osmosis/roles/update-authority";

  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string new_authority = 2 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
}

message MsgUpdateAuthorityResponse {}
