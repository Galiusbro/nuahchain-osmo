syntax = "proto3";

package osmosis.leverage.v1beta1;

import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto";
import "cosmos/base/v1beta1/coin.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/leverage/types";

// PositionSide defines the side of a position
enum PositionSide {
  option (gogoproto.goproto_enum_prefix) = false;

  // POSITION_SIDE_UNSPECIFIED defines an unspecified position side
  POSITION_SIDE_UNSPECIFIED = 0 [(gogoproto.enumvalue_customname) = "PositionSideUnspecified"];
  // POSITION_SIDE_LONG defines a long position
  POSITION_SIDE_LONG = 1 [(gogoproto.enumvalue_customname) = "PositionSideLong"];
  // POSITION_SIDE_SHORT defines a short position
  POSITION_SIDE_SHORT = 2 [(gogoproto.enumvalue_customname) = "PositionSideShort"];
}

// PositionStatus defines the status of a position
enum PositionStatus {
  option (gogoproto.goproto_enum_prefix) = false;

  // POSITION_STATUS_UNSPECIFIED defines an unspecified position status
  POSITION_STATUS_UNSPECIFIED = 0 [(gogoproto.enumvalue_customname) = "PositionStatusUnspecified"];
  // POSITION_STATUS_OPEN defines an open position
  POSITION_STATUS_OPEN = 1 [(gogoproto.enumvalue_customname) = "PositionStatusOpen"];
  // POSITION_STATUS_CLOSED defines a closed position
  POSITION_STATUS_CLOSED = 2 [(gogoproto.enumvalue_customname) = "PositionStatusClosed"];
  // POSITION_STATUS_LIQUIDATED defines a liquidated position
  POSITION_STATUS_LIQUIDATED = 3 [(gogoproto.enumvalue_customname) = "PositionStatusLiquidated"];
}

// Position represents a leverage trading position
message Position {
  // id is the unique identifier of the position
  string id = 1;

  // trader is the address of the trader who owns the position
  string trader = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // token_denom is the denomination of the token being traded
  string token_denom = 3;

  // collateral_denom is the denomination of the collateral
  string collateral_denom = 4;

  // side is the side of the position (LONG/SHORT)
  PositionSide side = 5;

  // size is the size of the position in base units
  string size = 6 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // collateral is the amount of collateral in base units
  string collateral = 7 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // leverage is the leverage multiplier
  string leverage = 8 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // entry_price is the price at which the position was opened
  string entry_price = 9 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // liquidation_price is the price at which the position will be liquidated
  string liquidation_price = 10 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // unrealized_pnl is the current unrealized profit/loss
  string unrealized_pnl = 11 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // status is the current status of the position
  PositionStatus status = 12;

  // created_at is the timestamp when the position was created
  int64 created_at = 13;

  // updated_at is the timestamp when the position was last updated
  int64 updated_at = 14;
}

// LeverageParams defines the parameters for the leverage module
message LeverageParams {
  // max_leverage is the maximum allowed leverage
  string max_leverage = 1 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // maintenance_margin is the minimum margin required to maintain a position
  string maintenance_margin = 2 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // liquidation_fee is the fee charged for liquidation
  string liquidation_fee = 3 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // trading_fee is the fee charged for opening/closing positions
  string trading_fee = 4 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // max_position_size is the maximum size of a single position
  string max_position_size = 5 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // min_collateral_amount is the minimum collateral required to open a position
  string min_collateral_amount = 6 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // base_interest_rate is the base interest rate for borrowing
  string base_interest_rate = 7 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // interest_rate_multiplier is the multiplier for utilization-based interest rates
  string interest_rate_multiplier = 8 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // max_interest_rate is the maximum allowed interest rate
  string max_interest_rate = 9 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // max_borrow_ratio is the maximum ratio of borrowed amount to collateral
  string max_borrow_ratio = 10 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}

// LendingPool represents a pool of tokens available for lending
message LendingPool {
  string denom = 1;

  string total_supply = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  string total_borrowed = 3 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  string available_liquidity = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  string interest_rate = 5 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  string utilization_rate = 6 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  int64 last_update_time = 7;
}

// BorrowPosition represents a borrowing position
message BorrowPosition {
  string id = 1;
  string borrower = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string token_denom = 3;

  string borrowed_amount = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  string accrued_interest = 5 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  string interest_rate = 6 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  int64 created_at = 7;
  int64 last_interest_time = 8;
  string leverage_position_id = 9;
}

// LiquidityProvider represents someone who provides liquidity to lending pools
message LiquidityProvider {
  string provider = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string token_denom = 2;

  string amount = 3 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  string share_tokens = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  int64 provided_at = 5;
}

// GenesisState defines the leverage module's genesis state
message GenesisState {
  // params defines all the parameters of the module
  LeverageParams params = 1 [(gogoproto.nullable) = false];

  // positions is the list of all positions
  repeated Position positions = 2 [(gogoproto.nullable) = false];

  // next_position_id is the next position ID to be used
  uint64 next_position_id = 3;

  // lending_pools is the list of all lending pools
  repeated LendingPool lending_pools = 4 [(gogoproto.nullable) = false];

  // borrow_positions is the list of all borrow positions
  repeated BorrowPosition borrow_positions = 5 [(gogoproto.nullable) = false];

  // liquidity_providers is the list of all liquidity providers
  repeated LiquidityProvider liquidity_providers = 6 [(gogoproto.nullable) = false];

  // next_borrow_id is the next borrow position ID to be used
  uint64 next_borrow_id = 7;
}
