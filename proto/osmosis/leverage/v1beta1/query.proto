syntax = "proto3";

package osmosis.leverage.v1beta1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos_proto/cosmos.proto";
import "osmosis/leverage/v1beta1/leverage.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/leverage/types";

// Query defines the gRPC querier service
service Query {
  // Params returns the module parameters
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/params";
  }

  // Position returns a specific position by ID
  rpc Position(QueryPositionRequest) returns (QueryPositionResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/positions/{position_id}";
  }

  // Positions returns all positions, optionally filtered by trader
  rpc Positions(QueryPositionsRequest) returns (QueryPositionsResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/positions";
  }

  // PositionsByTrader returns all positions for a specific trader
  rpc PositionsByTrader(QueryPositionsByTraderRequest) returns (QueryPositionsByTraderResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/positions/trader/{trader}";
  }

  // LiquidationPrice calculates the liquidation price for given parameters
  rpc LiquidationPrice(QueryLiquidationPriceRequest) returns (QueryLiquidationPriceResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/liquidation-price";
  }

  // EstimatePosition estimates the outcome of opening a position with given parameters
  rpc EstimatePosition(QueryEstimatePositionRequest) returns (QueryEstimatePositionResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/estimate-position";
  }

  // TokenPrice returns the current price of a token from the usertoken bonding curve
  rpc TokenPrice(QueryTokenPriceRequest) returns (QueryTokenPriceResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/token-price/{denom=**}";
  }

  // LendingPools returns all lending pools
  rpc LendingPools(QueryLendingPoolsRequest) returns (QueryLendingPoolsResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/lending-pools";
  }

  // LendingPool returns a specific lending pool by denom
  rpc LendingPool(QueryLendingPoolRequest) returns (QueryLendingPoolResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/lending-pool/{denom}";
  }

  // BorrowPositions returns all borrow positions for a borrower
  rpc BorrowPositions(QueryBorrowPositionsRequest) returns (QueryBorrowPositionsResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/borrow-positions/{borrower}";
  }

  // LiquidityProviders returns all liquidity providers
  rpc LiquidityProviders(QueryLiquidityProvidersRequest) returns (QueryLiquidityProvidersResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/liquidity-providers";
  }

  // Stats returns leverage module statistics
  rpc Stats(QueryStatsRequest) returns (QueryStatsResponse) {
    option (google.api.http).get = "/osmosis/leverage/v1beta1/stats";
  }
}

// QueryParamsRequest is the request type for the Query/Params RPC method
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Query/Params RPC method
message QueryParamsResponse {
  // params defines the parameters of the module
  LeverageParams params = 1 [(gogoproto.nullable) = false];
}

// QueryPositionRequest is the request type for the Query/Position RPC method
message QueryPositionRequest {
  // position_id is the ID of the position to query
  string position_id = 1;
}

// QueryPositionResponse is the response type for the Query/Position RPC method
message QueryPositionResponse {
  // position is the requested position
  Position position = 1 [(gogoproto.nullable) = false];
}

// QueryPositionsRequest is the request type for the Query/Positions RPC method
message QueryPositionsRequest {
  // pagination defines an optional pagination for the request
  cosmos.base.query.v1beta1.PageRequest pagination = 1;

  // status filters positions by status (optional)
  PositionStatus status = 2;

  // token_denom filters positions by token denomination (optional)
  string token_denom = 3;
}

// QueryPositionsResponse is the response type for the Query/Positions RPC method
message QueryPositionsResponse {
  // positions is the list of positions
  repeated Position positions = 1 [(gogoproto.nullable) = false];

  // pagination defines the pagination in the response
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryPositionsByTraderRequest is the request type for the Query/PositionsByTrader RPC method
message QueryPositionsByTraderRequest {
  // trader is the address of the trader
  string trader = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // pagination defines an optional pagination for the request
  cosmos.base.query.v1beta1.PageRequest pagination = 2;

  // status filters positions by status (optional)
  PositionStatus status = 3;
}

// QueryPositionsByTraderResponse is the response type for the Query/PositionsByTrader RPC method
message QueryPositionsByTraderResponse {
  // positions is the list of positions for the trader
  repeated Position positions = 1 [(gogoproto.nullable) = false];

  // pagination defines the pagination in the response
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryLiquidationPriceRequest is the request type for the Query/LiquidationPrice RPC method
message QueryLiquidationPriceRequest {
  // collateral_amount is the amount of collateral
  string collateral_amount = 1 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // position_size is the size of the position
  string position_size = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // entry_price is the entry price of the position
  string entry_price = 3 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // side is the position side
  PositionSide side = 4;
}

// QueryLiquidationPriceResponse is the response type for the Query/LiquidationPrice RPC method
message QueryLiquidationPriceResponse {
  // liquidation_price is the calculated liquidation price
  string liquidation_price = 1 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}

// QueryEstimatePositionRequest is the request type for the Query/EstimatePosition RPC method
message QueryEstimatePositionRequest {
  // token_denom is the denomination of the token to trade
  string token_denom = 1;

  // collateral_amount is the amount of collateral
  string collateral_amount = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // leverage is the desired leverage
  string leverage = 3 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // side is the position side
  PositionSide side = 4;
}

// QueryEstimatePositionResponse is the response type for the Query/EstimatePosition RPC method
message QueryEstimatePositionResponse {
  // position_size is the estimated position size
  string position_size = 1 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // entry_price is the estimated entry price
  string entry_price = 2 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // liquidation_price is the estimated liquidation price
  string liquidation_price = 3 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // trading_fee is the estimated trading fee
  string trading_fee = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// QueryTokenPriceRequest is the request type for the Query/TokenPrice RPC method
message QueryTokenPriceRequest {
  // denom is the denomination of the token
  string denom = 1;
}

// QueryTokenPriceResponse is the response type for the Query/TokenPrice RPC method
message QueryTokenPriceResponse {
  // price is the current price of the token
  string price = 1 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // supply is the current supply of the token
  string supply = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// QueryLendingPoolsRequest is the request type for the Query/LendingPools RPC method
message QueryLendingPoolsRequest {}

// QueryLendingPoolsResponse is the response type for the Query/LendingPools RPC method
message QueryLendingPoolsResponse {
  // pools is the list of lending pools
  repeated LendingPool pools = 1 [(gogoproto.nullable) = false];
}

// QueryLendingPoolRequest is the request type for the Query/LendingPool RPC method
message QueryLendingPoolRequest {
  // denom is the denomination of the lending pool
  string denom = 1;
}

// QueryLendingPoolResponse is the response type for the Query/LendingPool RPC method
message QueryLendingPoolResponse {
  // pool is the lending pool
  LendingPool pool = 1 [(gogoproto.nullable) = false];
}

// QueryBorrowPositionsRequest is the request type for the Query/BorrowPositions RPC method
message QueryBorrowPositionsRequest {
  // borrower is the address of the borrower
  string borrower = 1;
}

// QueryBorrowPositionsResponse is the response type for the Query/BorrowPositions RPC method
message QueryBorrowPositionsResponse {
  // positions is the list of borrow positions
  repeated BorrowPosition positions = 1 [(gogoproto.nullable) = false];
}

// QueryLiquidityProvidersRequest is the request type for the Query/LiquidityProviders RPC method
message QueryLiquidityProvidersRequest {}

// QueryLiquidityProvidersResponse is the response type for the Query/LiquidityProviders RPC method
message QueryLiquidityProvidersResponse {
  // providers is the list of liquidity providers
  repeated LiquidityProvider providers = 1 [(gogoproto.nullable) = false];
}

// QueryStatsRequest is the request type for the Query/Stats RPC method
message QueryStatsRequest {}

// QueryStatsResponse is the response type for the Query/Stats RPC method
message QueryStatsResponse {
  // total_positions is the total number of positions
  uint64 total_positions = 1;

  // total_lending_pools is the total number of lending pools
  uint64 total_lending_pools = 2;

  // total_borrow_positions is the total number of borrow positions
  uint64 total_borrow_positions = 3;

  // total_liquidity_providers is the total number of liquidity providers
  uint64 total_liquidity_providers = 4;
}
