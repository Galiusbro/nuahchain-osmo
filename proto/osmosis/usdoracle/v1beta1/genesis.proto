syntax = "proto3";
package osmosis.usdoracle.v1beta1;

import "gogoproto/gogo.proto";
import "osmosis/usdoracle/v1beta1/params.proto";
import "osmosis/usdoracle/v1beta1/usdoracle.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/usdoracle/types";

// GenesisState defines the USD oracle module's genesis state.
message GenesisState {
  // Params defines the parameters of the module.
  Params params = 1 [ (gogoproto.nullable) = false ];
  // Current USD price
  USDPrice current_price = 2;
  // Price history
  repeated USDPrice price_history = 3 [ (gogoproto.nullable) = false ];
  // Price sources configuration
  repeated PriceSource price_sources = 4 [ (gogoproto.nullable) = false ];
}
