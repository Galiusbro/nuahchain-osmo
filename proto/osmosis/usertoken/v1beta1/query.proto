syntax = "proto3";
package osmosis.usertoken.v1beta1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "osmosis/usertoken/v1beta1/genesis.proto";
import "amino/amino.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/usertoken/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/osmosis/usertoken/v1beta1/params";
  }

  // UserToken queries a user token by denom.
  rpc UserToken(QueryUserTokenRequest) returns (QueryUserTokenResponse) {
    option (google.api.http).get =
        "/osmosis/usertoken/v1beta1/user_token/{denom}";
  }

  // UserTokens queries all user tokens.
  rpc UserTokens(QueryUserTokensRequest) returns (QueryUserTokensResponse) {
    option (google.api.http).get = "/osmosis/usertoken/v1beta1/user_tokens";
  }

  // BondingCurvePrice queries the current price of a token on the bonding
  // curve.
  rpc BondingCurvePrice(QueryBondingCurvePriceRequest)
      returns (QueryBondingCurvePriceResponse) {
    option (google.api.http).get =
        "/osmosis/usertoken/v1beta1/bonding_curve_price/{denom=**}";
  }

  // EstimateTokens estimates how many tokens would be received for a given payment amount.
  rpc EstimateTokens(QueryEstimateTokensRequest)
      returns (QueryEstimateTokensResponse) {
    option (google.api.http).get =
        "/osmosis/usertoken/v1beta1/estimate_tokens";
  }

  // ReferralProgram queries a referral program by token denom.
  rpc ReferralProgram(QueryReferralProgramRequest)
      returns (QueryReferralProgramResponse) {
    option (google.api.http).get =
        "/osmosis/usertoken/v1beta1/referral_program/{token_denom}";
  }

  // ReferralPrograms queries all referral programs.
  rpc ReferralPrograms(QueryReferralProgramsRequest)
      returns (QueryReferralProgramsResponse) {
    option (google.api.http).get =
        "/osmosis/usertoken/v1beta1/referral_programs";
  }

  // ReferralActivations queries referral activations for a user.
  rpc ReferralActivations(QueryReferralActivationsRequest)
      returns (QueryReferralActivationsResponse) {
    option (google.api.http).get =
        "/osmosis/usertoken/v1beta1/referral_activations/{user}";
  }

  // UserTokensByCreator queries all user tokens created by a specific
  // creator/wallet.
  rpc UserTokensByCreator(QueryUserTokensByCreatorRequest)
      returns (QueryUserTokensByCreatorResponse) {
    option (google.api.http).get =
        "/osmosis/usertoken/v1beta1/user_tokens_by_creator/{creator}";
  }

  // UserTokenMetadata queries metadata for a specific user token by denom.
  rpc UserTokenMetadata(QueryUserTokenMetadataRequest)
      returns (QueryUserTokenMetadataResponse) {
    option (google.api.http).get =
        "/osmosis/usertoken/v1beta1/user_token_metadata/{denom}";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}

// QueryUserTokenRequest is request type for the Query/UserToken RPC method.
message QueryUserTokenRequest { string denom = 1; }

// QueryUserTokenResponse is response type for the Query/UserToken RPC method.
message QueryUserTokenResponse { UserToken user_token = 1; }

// QueryUserTokensRequest is request type for the Query/UserTokens RPC method.
message QueryUserTokensRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryUserTokensResponse is response type for the Query/UserTokens RPC method.
message QueryUserTokensResponse {
  repeated UserToken user_tokens = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryBondingCurvePriceRequest is request type for the Query/BondingCurvePrice
// RPC method.
message QueryBondingCurvePriceRequest { string denom = 1; }

// QueryBondingCurvePriceResponse is response type for the
// Query/BondingCurvePrice RPC method.
message QueryBondingCurvePriceResponse {
  string price = 1 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}

// QueryEstimateTokensRequest is request type for the Query/EstimateTokens RPC method.
message QueryEstimateTokensRequest {
  string denom = 1;
  string payment_amount = 2;
}

// QueryEstimateTokensResponse is response type for the Query/EstimateTokens RPC method.
message QueryEstimateTokensResponse {
  string tokens_received = 1 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// QueryReferralProgramRequest is request type for the Query/ReferralProgram RPC
// method.
message QueryReferralProgramRequest { string token_denom = 1; }

// QueryReferralProgramResponse is response type for the Query/ReferralProgram
// RPC method.
message QueryReferralProgramResponse { ReferralProgram referral_program = 1; }

// QueryReferralProgramsRequest is request type for the Query/ReferralPrograms
// RPC method.
message QueryReferralProgramsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryReferralProgramsResponse is response type for the Query/ReferralPrograms
// RPC method.
message QueryReferralProgramsResponse {
  repeated ReferralProgram referral_programs = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryReferralActivationsRequest is request type for the
// Query/ReferralActivations RPC method.
message QueryReferralActivationsRequest {
  string user = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryReferralActivationsResponse is response type for the
// Query/ReferralActivations RPC method.
message QueryReferralActivationsResponse {
  repeated ReferralActivation referral_activations = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryUserTokensByCreatorRequest is request type for the
// Query/UserTokensByCreator RPC method.
message QueryUserTokensByCreatorRequest {
  string creator = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryUserTokensByCreatorResponse is response type for the
// Query/UserTokensByCreator RPC method.
message QueryUserTokensByCreatorResponse {
  repeated UserToken user_tokens = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryUserTokenMetadataRequest is request type for the Query/UserTokenMetadata
// RPC method.
message QueryUserTokenMetadataRequest { string denom = 1; }

// QueryUserTokenMetadataResponse is response type for the
// Query/UserTokenMetadata RPC method.
message QueryUserTokenMetadataResponse {
  string name = 1;
  string symbol = 2;
  string description = 3;
  string creator = 4;
  string max_supply = 5 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string current_supply = 6 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}
