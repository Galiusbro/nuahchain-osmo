syntax = "proto3";
package osmosis.usertoken.v1beta1;

import "gogoproto/gogo.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/usertoken/types";

message Token {
  string creator = 1;
  string denom = 2;
  string name = 3;
  string symbol = 4;
  string image = 5;
  string description = 6;
  uint64 created_at = 7;
  TokenDistribution distribution = 8 [(gogoproto.nullable) = false];
  TokenState state = 9 [(gogoproto.nullable) = false];
}

message TokenDistribution {
  string total_supply = 1;
  string bonding_curve_supply = 2;
  string platform_wallet = 3;
  string referral_wallet = 4;
  string ai_ceo_wallet = 5;
  string founder_reserved = 6;
  bool founder_claimed = 7;
  uint64 founder_claim_deadline = 8;
}

message TokenState {
  string bonding_curve_sold = 1;
  string current_price = 2;
  bool curve_completed = 3;
  bool dex_trading_enabled = 4;
  bool soft_lock_enabled = 5;
}
