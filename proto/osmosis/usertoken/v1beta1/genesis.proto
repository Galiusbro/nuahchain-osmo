syntax = "proto3";

package osmosis.usertoken.v1beta1;

import "gogoproto/gogo.proto";
import "amino/amino.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/usertoken/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "osmosis/x/usertoken/Params";
  option (gogoproto.goproto_stringer) = false;

  // Founder tranche price (in N$)
  string founder_tranche_price = 1 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // Founder tranche amount (10M tokens)
  string founder_tranche_amount = 2 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // Bonding curve start price
  string bonding_curve_start_price = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // Bonding curve end price
  string bonding_curve_end_price = 4 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // Bonding curve max supply (30M tokens)
  string bonding_curve_max_supply = 5 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // Minimum amount creator must purchase (in N$)
  string min_creator_purchase = 6 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // AI CEO wallet address for unclaimed founder tokens and bounty program
  string ai_ceo_wallet = 7;

  // Referral program wallet address
  string referral_wallet = 8;

  // Platform fee wallet address
  string platform_fee_wallet = 9;
}

// GenesisState defines the usertoken module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];

  // user_tokens defines all the user tokens.
  repeated UserToken user_tokens = 2
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];

  // referral_programs defines all the referral programs.
  repeated ReferralProgram referral_programs = 3
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];

  // referral_activations defines all the referral activations.
  repeated ReferralActivation referral_activations = 4
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];

  // user_referral_quotas defines all the user referral quotas.
  repeated UserReferralQuota user_referral_quotas = 5
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}

// UserToken defines a user token
message UserToken {
  string denom = 1;
  string creator = 2;
  string name = 3;
  string symbol = 4;
  string description = 5;
  string max_supply = 6 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string current_supply = 7 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string reserve_ratio = 8 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  string initial_price = 9 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  string founder_percentage = 10 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  string founder_tokens_claimed = 11 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  bool lbp_active = 12;
  int64 lbp_start_time = 13;
}

// ReferralProgram defines a referral program for a specific token
message ReferralProgram {
  string creator = 1;
  string token_denom = 2;
  uint32 available_links = 3;
  uint32 used_links = 4;
  int64 last_reset_time = 5;
  bool is_active = 6;
}

// ReferralActivation defines a referral activation
message ReferralActivation {
  string referral_code = 1;
  string referrer = 2;
  string referee = 3;
  string token_denom = 4;
  int64 activation_time = 5;
}

// UserReferralQuota defines global referral quota for a user
message UserReferralQuota {
  string user = 1;
  uint32 total_slots = 2;
  uint32 used_slots = 3;
  int64 last_reset_time = 4;
}
