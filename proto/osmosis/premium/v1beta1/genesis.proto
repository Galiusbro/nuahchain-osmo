syntax = "proto3";
package osmosis.premium.v1beta1;

import "gogoproto/gogo.proto";
import "osmosis/premium/v1beta1/params.proto";
import "osmosis/premium/v1beta1/premium.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/premium/types";

// GenesisState defines the premium module's genesis state.
message GenesisState {
  Params params = 1 [ (gogoproto.nullable) = false ];
  uint64 next_plan_id = 2;
  uint64 next_payment_id = 3;
  repeated PremiumPlan plans = 4 [ (gogoproto.nullable) = false ];
  repeated PremiumPayment payments = 5 [ (gogoproto.nullable) = false ];
  repeated PremiumOverdue overdue = 6 [ (gogoproto.nullable) = false ];
}
