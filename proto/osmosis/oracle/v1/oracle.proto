syntax = "proto3";

package osmosis.oracle.v1;

import "cosmos/msg/v1/msg.proto";
import "google/api/annotations.proto";

option go_package = "x/oracle/types";

message Price {
  string symbol = 1;
  string value = 2;
  string source = 3;      // Data source name
  int64 timestamp = 4;    // Unix timestamp
  float confidence = 5;   // Confidence score (0-1)
}

message QueryPriceRequest {
  string symbol = 1;
}

message QueryPriceResponse {
  Price price = 1;
}

message QueryPriceHistoryRequest {
  string symbol = 1;
  int64 start_time = 2;  // Unix timestamp
  int64 end_time = 3;    // Unix timestamp
  int32 limit = 4;       // Max number of records (default: 100)
}

message QueryPriceHistoryResponse {
  repeated PriceHistoryEntry entries = 1;
}

message PriceHistoryEntry {
  string symbol = 1;
  string value = 2;
  string source = 3;
  int64 timestamp = 4;
  float confidence = 5;
  int64 block_height = 6;  // Block height when price was recorded
}

service Query {
  rpc Price(QueryPriceRequest) returns (QueryPriceResponse) {
    option (google.api.http).get = "/osmosis/oracle/v1/price/{symbol}";
  }
  rpc PriceHistory(QueryPriceHistoryRequest) returns (QueryPriceHistoryResponse) {
    option (google.api.http).get = "/osmosis/oracle/v1/price-history/{symbol}";
  }
}

service Msg {
  rpc SetPrice(MsgSetPrice) returns (MsgSetPriceResponse) {
    option (google.api.http).post = "/osmosis/oracle/v1/set-price";
  }
}

message MsgSetPrice {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1;
  string symbol = 2;
  string value = 3;
}

message MsgSetPriceResponse {}

message GenesisState {
  repeated Price prices = 1;
}
