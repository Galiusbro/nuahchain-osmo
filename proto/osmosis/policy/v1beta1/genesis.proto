syntax = "proto3";
package osmosis.policy.v1beta1;

import "gogoproto/gogo.proto";
import "osmosis/policy/v1beta1/params.proto";
import "osmosis/policy/v1beta1/policy.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/policy/types";

// GenesisState defines the policy module's genesis state.
message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false];
  uint64 next_policy_id = 2;
  repeated Policy policies = 3 [(gogoproto.nullable) = false];
}
