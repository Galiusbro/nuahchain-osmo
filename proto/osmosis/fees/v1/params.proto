syntax = "proto3";

package osmosis.fees.v1;

option go_package = "x/fees/types";

message Params {
  string param_name = 1;
}

message QueryParamsRequest {}

message QueryParamsResponse {
  Params params = 1;
}

service Query {
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse);
}

message GenesisState {
  Params params = 1;
}
