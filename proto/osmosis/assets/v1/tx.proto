syntax = "proto3";

package osmosis.assets.v1;

import "cosmos/msg/v1/msg.proto";
import "google/api/annotations.proto";
import "osmosis/assets/v1/genesis.proto";

option go_package = "x/assets/types";

service Msg {
  rpc EnsureAsset(MsgEnsureAsset) returns (MsgEnsureAssetResponse) {
    option (google.api.http).post = "/osmosis/assets/v1/ensure";
  }
  rpc BuyAsset(MsgBuyAsset) returns (MsgBuyAssetResponse) {
    option (google.api.http).post = "/osmosis/assets/v1/buy";
  }
  rpc SellAsset(MsgSellAsset) returns (MsgSellAssetResponse) {
    option (google.api.http).post = "/osmosis/assets/v1/sell";
  }
}

message MsgEnsureAsset {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  string symbol = 2;
}

message MsgEnsureAssetResponse {
  Asset asset = 1;
}

message MsgBuyAsset {
  option (cosmos.msg.v1.signer) = "buyer";
  string buyer = 1;
  string symbol = 2;
  string amount_NDOLLAR = 3; // deprecated: use amount and denom instead
  string denom = 4; // denom to use for payment (NDOLLAR or unuah)
  string amount = 5; // amount in the specified denom
}

message MsgBuyAssetResponse {
  string base_amount = 1;
}

message MsgSellAsset {
  option (cosmos.msg.v1.signer) = "seller";
  string seller = 1;
  string symbol = 2;
  string base_amount = 3;
}

message MsgSellAssetResponse {
  string payout_NDOLLAR = 1;
}
