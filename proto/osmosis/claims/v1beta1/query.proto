syntax = "proto3";
package osmosis.claims.v1beta1;

import "cosmos/base/query/v1beta1/pagination.proto";
import "google/api/annotations.proto";
import "gogoproto/gogo.proto";
import "osmosis/claims/v1beta1/claim.proto";
import "osmosis/claims/v1beta1/params.proto";

option go_package = "github.com/osmosis-labs/osmosis/v30/x/claims/types";

service Query {
  rpc Claim(QueryClaimRequest) returns (QueryClaimResponse) {
    option (google.api.http).get = "/osmosis/claims/v1beta1/claims/{claim_id}";
  };

  rpc Claims(QueryClaimsRequest) returns (QueryClaimsResponse) {
    option (google.api.http).get = "/osmosis/claims/v1beta1/claims";
  };

  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/osmosis/claims/v1beta1/params";
  };
}

message QueryClaimRequest {
  uint64 claim_id = 1;
}

message QueryClaimResponse {
  Claim claim = 1;
}

message QueryClaimsRequest {
  uint64 policy_id = 1;
  string claimant = 2;
  ClaimStatus status = 3;
  cosmos.base.query.v1beta1.PageRequest pagination = 4;
}

message QueryClaimsResponse {
  repeated Claim claims = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryParamsRequest {}

message QueryParamsResponse {
  Params params = 1;
}
